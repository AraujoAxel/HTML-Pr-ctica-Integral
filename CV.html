<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum Vitae</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
}

form{
    width:800px;
    margin:auto;
    background:white;
    padding:20px;
}

h2{
    background:#ddd;
    padding:10px;
}
</style>
</head>
<body>

<form>

<h1>Curriculum Vitae Online</h1>

<h2>Datos Personales</h2>

<label>Nombre</label>
<input type="text">

<label>Apellido</label>
<input type="text">

<label>DNI</label>
<input type="text">

<label>Fecha de Nacimiento</label>
<input type="date">

<label>Teléfono</label>
<input type="tel">

<label>Email</label>
<input type="email">

<label>Dirección</label>
<input type="text">

<label>Foto</label>
<input type="file">

<h2>Información Académica</h2>

<label>Título Secundario</label>
<input type="text">

<label>Título Universitario</label>
<input type="text">

<label>Institución</label>
<input type="text">

<label>Idiomas</label>
<input type="text">

<label>Cursos</label>
<textarea rows="5" cols="50"></textarea>

<h2>Experiencia Laboral</h2>

<label>Empresa</label>
<input type="text">

<label>Cargo</label>
<input type="text">

<label>Fecha de Inicio</label>
<input type="date">

<label>Fecha de Fin</label>
<input type="date">

<label>Descripción</label>
<textarea rows="5" cols="50"></textarea>

<h2>Referencias</h2>

<label>Nombre de Referencia</label>
<input type="text">

<label>Teléfono</label>
<input type="tel">

<label>Email</label>
<input type="email">

<br><br>

<button type="submit">Enviar CV</button>

</form>

</body>
</html>
